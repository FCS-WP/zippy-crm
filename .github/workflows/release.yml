name: Build & Release

on:
  push:
    tags:
      - 'v*'         # e.g. v1.0.0, v1.2.3-beta
  workflow_dispatch: # also allow manual runs

permissions:
  contents: write    # needed to create a GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(grep -E '^[[:space:]]*\*[[:space:]]*Version:' zippy-crm.php \
              | head -1 | sed -E 's/.*Version:[[:space:]]*([0-9A-Za-z._-]+).*/\1/')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Build release zip
        run: |
          chmod +x scripts/build-release.sh
          ./scripts/build-release.sh "${{ steps.ver.outputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zippy-crm-${{ steps.ver.outputs.version }}
          path: dist/zippy-crm-${{ steps.ver.outputs.version }}.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/zippy-crm-${{ steps.ver.outputs.version }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
